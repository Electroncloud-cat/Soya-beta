<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>阅读 · 涟宗也</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --bg: #0d0e14;
  --bg2: #13141c;
  --bg3: #1a1b26;
  --bg4: #21223a;
  --border: #2a2b3a;
  --accent: #6c8cff;
  --accent2: #a78bfa;
  --text: #d4d6e8;
  --text2: #7a7d99;
  --text3: #4a4d66;
  --danger: #ff6b8a;
  --radius: 10px;

  /* Reader themes */
  --reader-bg: #0d0e14;
  --reader-text: #c8cce0;
  --reader-paper: #13141c;
}

/* Sepia theme */
body.sepia {
  --reader-bg: #1a1510;
  --reader-text: #c8b89a;
  --reader-paper: #201c17;
  --bg: #1a1510;
  --bg2: #201c17;
  --bg3: #2a2518;
  --border: #3a3228;
  --text2: #8a7d69;
  --text3: #5a5040;
}

/* Light theme */
body.light {
  --reader-bg: #f5f4f0;
  --reader-text: #2a2a35;
  --reader-paper: #faf9f6;
  --bg: #f0eff0;
  --bg2: #faf9f6;
  --bg3: #ece9e4;
  --border: #d0cec8;
  --text: #2a2a35;
  --text2: #6a6a75;
  --text3: #a0a0aa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--reader-bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .3s, color .3s;
}

/* ── Top Bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 48px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#topbar .book-title-bar {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 1px;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text2);
}
#topbar .book-title-bar strong { color: var(--text); }

.tb-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: .2s;
  white-space: nowrap;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,.1); }

/* Progress bar */
#progress-bar {
  height: 2px;
  background: var(--bg3);
  flex-shrink: 0;
  position: relative;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .4s ease;
  width: 0%;
}

/* ── Main Layout ── */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── TOC Sidebar ── */
#toc-sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .3s, min-width .3s;
}
#toc-sidebar.hidden { width: 0; min-width: 0; border: none; }
#toc-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}
#toc-list {
  overflow-y: auto;
  flex: 1;
  padding: 6px 0;
}
#toc-list::-webkit-scrollbar { width: 3px; }
#toc-list::-webkit-scrollbar-thumb { background: var(--border); }
.toc-item {
  padding: 7px 16px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: .15s;
  border-left: 2px solid transparent;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.toc-item:hover { color: var(--text); background: var(--bg3); }
.toc-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(108,140,255,.06); }

/* ── Reader Area ── */
#reader-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--reader-bg);
}

#chapter-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}
#chapter-nav .chap-info {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#chapter-nav .chap-info strong { color: var(--text2); }
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

#reader-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 40px 0;
  display: flex;
  justify-content: center;
}
#reader-scroll::-webkit-scrollbar { width: 5px; }
#reader-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

#reader-content {
  width: 100%;
  max-width: 660px;
  padding: 0 32px;
}

#chapter-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--reader-text);
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}

#chapter-body {
  font-family: 'Noto Serif SC', serif;
  color: var(--reader-text);
  line-height: 2;
  white-space: pre-wrap;
  word-break: break-word;
  transition: font-size .2s;
}

/* Selection-to-discuss */
#selection-popup {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 6px 4px;
  gap: 4px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
#selection-popup.show { display: flex; }
.sel-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: .15s;
  white-space: nowrap;
}
.sel-btn:hover { background: var(--bg3); color: var(--accent); }

/* Reading controls */
#reader-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.ctrl-label { font-size: 11px; color: var(--text3); }
.ctrl-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: .15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.theme-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: .15s;
}
.theme-btn.active { border-color: var(--accent); }
.theme-dark  { background: #0d0e14; }
.theme-sepia { background: #3a3020; }
.theme-light { background: #f5f4f0; border: 1px solid var(--border); }
#font-size-display { font-size: 11px; color: var(--text2); min-width: 32px; text-align: center; }
.ctrl-spacer { flex: 1; }

/* ── Chat Panel ── */
#chat-panel {
  width: 320px;
  min-width: 320px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .3s, min-width .3s;
}
#chat-panel.hidden { width: 0; min-width: 0; border: none; }

#chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#chat-header span { flex: 1; }
.chat-panel-name {
  font-family: 'Noto Serif SC', serif;
  color: var(--text);
  font-weight: 500;
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); }

.cmsg {
  max-width: 90%;
  padding: 9px 12px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.cmsg.user { background: #1e2035; border: 1px solid rgba(108,140,255,.2); align-self: flex-end; border-bottom-right-radius: 3px; }
.cmsg.ai   { background: #161824; border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 3px; }
.cmsg.error{ border-color: rgba(255,107,138,.3); color: var(--danger); }
.cmsg-time { font-size: 9px; color: var(--text3); margin-top: 3px; }

/* Light theme chat overrides */
body.light .cmsg.user { background: #dde4ff; border-color: rgba(108,140,255,.3); color: #2a2a35; }
body.light .cmsg.ai   { background: #f0eff0; border-color: #d0cec8; color: #2a2a35; }
body.light .cmsg-time { color: #a0a0aa; }
body.sepia .cmsg.user { background: #3a3020; border-color: rgba(108,140,255,.2); color: #c8b89a; }
body.sepia .cmsg.ai   { background: #2a2518; border-color: #3a3228; color: #c8b89a; }

/* Quote chip in input area */
#quote-chip {
  display: none;
  align-items: flex-start;
  gap: 6px;
  padding: 7px 10px;
  background: rgba(108,140,255,.08);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  margin: 0 12px 6px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}
#quote-chip.show { display: flex; }
#quote-chip-text { flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
#quote-chip-label { font-size: 10px; color: var(--accent); margin-bottom: 2px; }
#quote-chip-cancel { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0; flex-shrink: 0; line-height: 1; }
#quote-chip-cancel:hover { color: var(--danger); }

/* Bookshelf modal */
#shelf-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#shelf-modal.show { display: flex; }
#shelf-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 480px;
  max-width: 90vw;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#shelf-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
}
#shelf-header span { flex: 1; }
#shelf-list {
  overflow-y: auto;
  flex: 1;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.shelf-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: .15s;
  gap: 12px;
}
.shelf-item:hover { border-color: var(--accent); background: rgba(108,140,255,.05); }
.shelf-item.active { border-color: var(--accent); background: rgba(108,140,255,.08); }
.shelf-item-icon { font-size: 22px; flex-shrink: 0; }
.shelf-item-info { flex: 1; overflow: hidden; cursor: pointer; }
.shelf-item-title { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.shelf-item-meta  { font-size: 11px; color: var(--text3); margin-top: 2px; }
.shelf-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.shelf-empty { color: var(--text3); text-align: center; padding: 32px; font-size: 13px; }

/* Quote message bubble in chat */
.cmsg-quote {
  border-left: 3px solid var(--accent);
  padding-left: 8px;
  margin-bottom: 5px;
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.cmsg-quote-label { font-size: 10px; color: var(--accent); font-style: normal; margin-bottom: 2px; }

#chat-typing {
  display: none;
  padding: 0 12px 8px;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
#chat-typing.show { display: flex; }
.mini-dots { display: flex; gap: 3px; }
.mini-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce .9s infinite; }
.mini-dot:nth-child(2){animation-delay:.15s;}.mini-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px);background:var(--accent)}}

#chat-input-area {
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  padding: 0;
}
#chat-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px;
  resize: none;
  min-height: 34px;
  max-height: 100px;
  outline: none;
  transition: .2s;
  line-height: 1.5;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text3); }
#chat-send {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: .2s;
  flex-shrink: 0;
}
#chat-send:hover { opacity: .85; }
#chat-send:disabled { opacity: .4; cursor: not-allowed; }

/* Empty state */
#no-book {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  color: var(--text3);
  padding: 40px;
  text-align: center;
}
#no-book .big { font-size: 48px; opacity: .3; }
#no-book h2 { font-family: 'Noto Serif SC', serif; font-size: 18px; color: var(--text2); letter-spacing: 2px; }
#no-book p { font-size: 13px; line-height: 1.8; }

.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 32px;
  cursor: pointer;
  transition: .2s;
  text-align: center;
}
.upload-area:hover { border-color: var(--accent); background: rgba(108,140,255,.05); }
.upload-area .upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-area p { font-size: 13px; color: var(--text2); }
.upload-area small { font-size: 11px; color: var(--text3); }

/* Highlight on selection */
.highlight { background: rgba(108,140,255,.2); border-radius: 2px; }

/* Bookmark modal */
#bookmark-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#bookmark-modal.show { display: flex; }
#bookmark-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 420px;
  max-width: 90vw;
  max-height: 65vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#bookmark-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  flex-shrink: 0;
}
#bookmark-header span { flex: 1; }
#bookmark-list {
  overflow-y: auto;
  flex: 1;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#bookmark-list::-webkit-scrollbar { width: 3px; }
#bookmark-list::-webkit-scrollbar-thumb { background: var(--border); }
.bk-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: .15s;
}
.bk-item:hover { border-color: var(--accent); background: rgba(108,140,255,.05); }
.bk-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.bk-info { flex: 1; overflow: hidden; }
.bk-chap { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.bk-time { font-size: 10px; color: var(--text3); margin-top: 2px; }
.bk-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.bk-del:hover { color: var(--danger); }
.bk-empty { color: var(--text3); text-align: center; padding: 32px; font-size: 13px; }
#bookmark-add-footer { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* Notification */
#notif {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 16px;
  border-radius: 99px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: .25s;
  z-index: 300;
}
#notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <button class="tb-btn" onclick="history.back()" title="返回">← 返回</button>
  <button class="tb-btn active" id="btn-toc" onclick="toggleTOC()" title="目录">☰ 目录</button>
  <div class="book-title-bar" id="topbar-title">
    <strong>正在加载…</strong>
  </div>
  <button class="tb-btn" onclick="openShelf()" title="书柜">📚 书柜</button>
  <button class="tb-btn" id="btn-close-book" onclick="closeBook()" title="关闭书籍" style="display:none">✕ 关闭</button>
  <button class="tb-btn" id="btn-chat" onclick="toggleChat()">💬 讨论</button>
  <button class="tb-btn" id="btn-bookmark" onclick="openBookmarks()" title="书签" style="display:none">🔖 书签</button>
  <a class="tb-btn" href="/" title="回到主页">涟宗也 →</a>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="layout">

  <!-- TOC Sidebar -->
  <div id="toc-sidebar">
    <div id="toc-header">目 录</div>
    <div id="toc-list"></div>
  </div>

  <!-- Reader Area -->
  <div id="reader-area">
    <!-- No book loaded state -->
    <div id="no-book">
      <div class="big">📖</div>
      <h2>尚未加载书籍</h2>
      <p>请先从主页上传电子书，<br>或直接拖放文件到这里</p>
      <div class="upload-area" onclick="document.getElementById('book-file-input').click()" id="upload-drop-area">
        <div class="upload-icon">＋</div>
        <p>点击或拖放上传</p>
        <small>支持 .txt · .pdf · .epub</small>
      </div>
      <input type="file" id="book-file-input" accept=".txt,.pdf,.epub,.md" style="display:none" onchange="onBookFileSelected(event)">
    </div>

    <!-- Book content (hidden until book loaded) -->
    <div id="book-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div id="chapter-nav">
        <button class="nav-btn" id="btn-prev" onclick="goChapter(currentChapter-1)" disabled>← 上一章</button>
        <div class="chap-info" id="chap-info">—</div>
        <button class="nav-btn" id="btn-next" onclick="goChapter(currentChapter+1)">下一章 →</button>
      </div>
      <div id="reader-scroll" onscroll="onReaderScroll()">
        <div id="reader-content">
          <div id="chapter-title"></div>
          <div id="chapter-body"></div>
        </div>
      </div>
      <div id="reader-controls">
        <span class="ctrl-label">字号</span>
        <button class="ctrl-btn" onclick="changeFontSize(-1)">A−</button>
        <span id="font-size-display">18</span>
        <button class="ctrl-btn" onclick="changeFontSize(1)">A+</button>
        <span class="ctrl-label" style="margin-left:8px">主题</span>
        <button class="theme-btn theme-dark active"  id="theme-dark"  onclick="setTheme('dark')"  title="深色"></button>
        <button class="theme-btn theme-sepia"        id="theme-sepia" onclick="setTheme('sepia')" title="护眼"></button>
        <button class="theme-btn theme-light"        id="theme-light" onclick="setTheme('light')" title="浅色"></button>
        <span class="ctrl-spacer"></span>
        <button class="ctrl-btn" onclick="addBookmark()" title="添加书签" style="font-size:12px;width:auto;padding:0 10px;letter-spacing:.03em">🔖 书签</button>
        <span id="reading-progress-label" class="ctrl-label"></span>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <span><span class="chat-panel-name">涟宗也</span> 在一起读</span>
      <button class="tb-btn" style="padding:2px 7px;font-size:11px" onclick="toggleChat()">收起</button>
    </div>
    <div id="chat-messages">
      <div class="cmsg ai">把书加载进来，我们一起看。</div>
    </div>
    <div id="chat-typing">
      <div class="mini-dots"><div class="mini-dot"></div><div class="mini-dot"></div><div class="mini-dot"></div></div>
    </div>
    <div id="chat-input-area">
      <div id="quote-chip">
        <div style="flex:1">
          <div id="quote-chip-label">引用段落</div>
          <div id="quote-chip-text"></div>
        </div>
        <button id="quote-chip-cancel" onclick="clearQuote()" title="取消引用">×</button>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end;padding:10px 12px;padding-top:0">
        <textarea id="chat-input" rows="1" placeholder="和涟宗也讨论这本书…"></textarea>
        <button id="chat-send" onclick="sendChatMsg()">发</button>
      </div>
    </div>
  </div>

</div>

<!-- Selection popup -->
<div id="selection-popup">
  <button class="sel-btn" onclick="quoteSelection()">📌 引用这段</button>
</div>

<div id="notif"></div>

<!-- Bookmark Modal -->
<div id="bookmark-modal" onclick="if(event.target===this)closeBookmarks()">
  <div id="bookmark-box">
    <div id="bookmark-header">
      <span>🔖 我的书签</span>
      <button class="tb-btn" onclick="closeBookmarks()">关闭</button>
    </div>
    <div id="bookmark-list"></div>
    <div id="bookmark-add-footer">
      <button class="tb-btn" style="width:100%;text-align:center;padding:7px" onclick="addBookmark()">＋ 在当前位置添加书签</button>
    </div>
  </div>
</div>

<!-- Bookshelf Modal -->
<div id="shelf-modal" onclick="if(event.target===this)closeShelf()">
  <div id="shelf-box">
    <div id="shelf-header">
      <span>📚 我的书柜</span>
      <button class="tb-btn" onclick="closeShelf()">关闭</button>
    </div>
    <div id="shelf-list">
      <div class="shelf-empty" id="shelf-empty">书柜为空，请上传电子书</div>
    </div>
    <div style="padding:10px 12px;border-top:1px solid var(--border)">
      <button class="tb-btn" style="width:100%;text-align:center" onclick="document.getElementById('shelf-file-input').click()">＋ 导入新书</button>
      <input type="file" id="shelf-file-input" accept=".txt,.pdf,.epub,.md" style="display:none" onchange="onShelfFileSelected(event)">
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
let bookMeta = null;        // { title, total, chapters[] }
let currentChapter = 0;
let fontSize = 18;
let chatHistory = [];       // for API
let readerChatMessages = []; // for syncing with main history
let chatLoading = false;
let settings = {};
let selectedText = '';
let bookmarks = [];         // { title, chapter, chapterTitle, scrollTop, time }

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
async function init() {
  await loadSettings();
  setupChatInput();
  setupTextSelection();
  setupDragDrop();
  loadBookmarks();
  await tryLoadBook();
  await restoreReaderChat();
  // Feature 2: Push "online in reader" status so monitor widget stays green
  pushReaderActivityStatus();
  setInterval(pushReaderActivityStatus, 8000);
}

async function pushReaderActivityStatus() {
  try {
    await fetch('/api/activity-status', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        page_visible: true,
        in_reader: true,
        mouse_idle: false,
        active_window: '阅读器 — ' + (bookMeta ? bookMeta.title : ''),
        is_typing: false,
        session_clicks: 0
      })
    });
  } catch(e) {}
}

async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    settings = await r.json();
  } catch(e) { settings = {}; }
}

async function restoreReaderChat() {
  // Pull messages from main history that were created during reading sessions
  try {
    const r = await fetch('/api/history');
    if (!r.ok) return;
    const data = await r.json();
    const allMsgs = data.messages || [];
    const readerMsgs = allMsgs.filter(m =>
      typeof m.content === 'string' && m.content.startsWith('[阅读中]')
    );
    if (readerMsgs.length === 0) return;
    // Clear the default greeting and restore messages
    const chatMsgs = document.getElementById('chat-messages');
    chatMsgs.innerHTML = '';
    readerMsgs.forEach(m => {
      const isUser = m.role === 'user';
      // Strip the [阅读中] prefix for display
      const displayText = m.content.replace(/^\[阅读中[^\]]*\]\s*/, '');
      appendChatMsg(isUser ? 'user' : 'ai', displayText);
      // Also rebuild chatHistory for API continuity
      chatHistory.push({ role: m.role, content: displayText });
    });
  } catch(e) {}
}

async function tryLoadBook() {
  try {
    const r = await fetch('/api/book');
    if (!r.ok) return;  // no book loaded
    bookMeta = await r.json();
    initBookUI();
    // Restore saved chapter from server
    let savedChapter = 0;
    try {
      const sr = await fetch('/api/reader-state');
      const state = await sr.json();
      const key = 'chapter_' + bookMeta.title;
      if (state[key] !== undefined) savedChapter = state[key];
    } catch(e) {}
    await goChapter(savedChapter);
  } catch(e) {}
}

// ══════════════════════════════════════════
//  Book UI
// ══════════════════════════════════════════
function initBookUI() {
  document.getElementById('no-book').style.display = 'none';
  const bv = document.getElementById('book-view');
  bv.style.display = 'flex';
  document.getElementById('btn-close-book').style.display = '';
  document.getElementById('btn-bookmark').style.display = '';

  // Set title
  document.getElementById('topbar-title').innerHTML = `<strong>${escHtml(bookMeta.title)}</strong> <span style="color:var(--text3)">· ${bookMeta.total} 章</span>`;
  document.title = `${bookMeta.title} · 涟宗也`;

  // Build TOC
  const tocList = document.getElementById('toc-list');
  tocList.innerHTML = '';
  (bookMeta.chapters || []).forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.textContent = ch.title || `第 ${i+1} 章`;
    item.dataset.idx = i;
    item.onclick = () => goChapter(i);
    tocList.appendChild(item);
  });
}

async function goChapter(idx) {
  if (!bookMeta) return;
  if (idx < 0 || idx >= bookMeta.total) return;
  currentChapter = idx;

  try {
    const r = await fetch(`/api/book/chapter/${idx}`);
    if (!r.ok) throw new Error();
    const data = await r.json();

    document.getElementById('chapter-title').textContent = data.title;
    document.getElementById('chapter-body').textContent  = data.content;
    document.getElementById('chapter-body').style.fontSize = fontSize + 'px';

    // Chapter nav
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx >= bookMeta.total - 1;
    document.getElementById('btn-next').textContent = data.next_title ? `${data.next_title} →` : '→';
    document.getElementById('btn-prev').textContent = data.prev_title ? `← ${data.prev_title}` : '←';
    document.getElementById('chap-info').innerHTML = `<strong>${data.title}</strong> &nbsp;·&nbsp; ${idx+1} / ${data.total}`;

    // TOC highlight
    document.querySelectorAll('.toc-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
    // Scroll TOC item into view
    const activeItem = document.querySelector('.toc-item.active');
    if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Scroll reader to top
    document.getElementById('reader-scroll').scrollTop = 0;
    updateProgress();

    // Save position to server
    try {
      await fetch('/api/reader-state', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ ['chapter_' + bookMeta.title]: idx })
      });
    } catch(e) {}
  } catch(e) {
    notify('章节加载失败', true);
  }
}

function onReaderScroll() {
  updateProgress();
}

function updateProgress() {
  const scroll = document.getElementById('reader-scroll');
  const chapterProgress = (scroll.scrollTop / (scroll.scrollHeight - scroll.clientHeight)) || 0;
  const overall = (currentChapter + chapterProgress) / Math.max(bookMeta?.total || 1, 1);
  document.getElementById('progress-fill').style.width = (overall * 100) + '%';
  const pct = Math.round(overall * 100);
  document.getElementById('reading-progress-label').textContent = `${pct}%`;
}

// ══════════════════════════════════════════
//  Font & Theme
// ══════════════════════════════════════════
function changeFontSize(delta) {
  fontSize = Math.max(12, Math.min(28, fontSize + delta));
  document.getElementById('chapter-body').style.fontSize = fontSize + 'px';
  document.getElementById('font-size-display').textContent = fontSize;
}

function setTheme(theme) {
  document.body.className = theme === 'dark' ? '' : theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('theme-' + theme).classList.add('active');
  localStorage.setItem('reader_theme', theme);
}

// ══════════════════════════════════════════
//  Text Selection
// ══════════════════════════════════════════
function setupTextSelection() {
  document.addEventListener('mouseup', e => {
    const sel = window.getSelection();
    const txt = sel?.toString().trim();
    if (txt && txt.length > 3 && document.getElementById('chapter-body').contains(sel.anchorNode)) {
      selectedText = txt;
      showSelectionPopup(e.clientX, e.clientY);
    } else {
      hideSelectionPopup();
    }
  });
  document.addEventListener('mousedown', e => {
    if (!document.getElementById('selection-popup').contains(e.target)) {
      hideSelectionPopup();
    }
  });
}

function showSelectionPopup(x, y) {
  const popup = document.getElementById('selection-popup');
  popup.classList.add('show');
  const pw = popup.offsetWidth || 240;
  const ph = popup.offsetHeight || 40;
  const nx = Math.min(x, window.innerWidth - pw - 10);
  const ny = Math.max(y - ph - 10, 10);
  popup.style.left = nx + 'px';
  popup.style.top  = ny + 'px';
}

function hideSelectionPopup() {
  document.getElementById('selection-popup').classList.remove('show');
}

function quoteSelection() {
  hideSelectionPopup();
  if (!selectedText) return;
  const chip = document.getElementById('quote-chip');
  const chipText = document.getElementById('quote-chip-text');
  const short = selectedText.length > 120 ? selectedText.slice(0, 120) + '…' : selectedText;
  chipText.textContent = short;
  chip.classList.add('show');
  document.getElementById('chat-input').focus();
  window.getSelection()?.removeAllRanges();
}

function clearQuote() {
  selectedText = '';
  document.getElementById('quote-chip').classList.remove('show');
  document.getElementById('quote-chip-text').textContent = '';
}

// ══════════════════════════════════════════
//  Chat
// ══════════════════════════════════════════
function setupChatInput() {
  const inp = document.getElementById('chat-input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  });
}

async function sendChatMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || chatLoading) return;
  inp.value = ''; inp.style.height = 'auto';

  // Read quote if active
  const chip = document.getElementById('quote-chip');
  const quotedText = chip.classList.contains('show')
    ? document.getElementById('quote-chip-text').textContent : '';
  clearQuote();

  await sendChatMsgText(text, quotedText);
}

async function sendChatMsgText(text, quotedText) {
  if (chatLoading) return;
  appendChatMsg('user', text, false, quotedText);

  // Build API message — include quote in content so AI sees it
  const apiContent = quotedText
    ? `【引用段落】\n"${quotedText}"\n\n${text}`
    : text;
  chatHistory.push({ role: 'user', content: apiContent });

  const displayText = quotedText ? `【引用】"${quotedText}"\n${text}` : text;
  const bookTag = bookMeta ? `[阅读中《${bookMeta.title}》]` : '[阅读中]';
  const userEntry = { role: 'user', content: `${bookTag} ${displayText}`, time: nowTime() };
  readerChatMessages.push(userEntry);

  // Build book context
  let bookCtx = '';
  if (bookMeta) {
    bookCtx = `书名《${bookMeta.title}》，正在读第 ${currentChapter+1} 章（共 ${bookMeta.total} 章）。`;
  }

  setChatLoading(true);
  try {
    const body = {
      messages: chatHistory,
      book_context: bookCtx
    };
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`服务器错误 ${r.status}`);
    const data = await r.json();
    if (data.error) {
      appendChatMsg('ai', data.error, true);
    } else {
      appendChatMsg('ai', data.content);
      chatHistory.push({ role: 'assistant', content: data.content });
      const aiEntry = { role: 'assistant', content: `${bookTag} ${data.content}`, time: nowTime() };
      readerChatMessages.push(aiEntry);
      // Sync to main history
      syncToMainHistory();
    }
  } catch(e) {
    appendChatMsg('ai', `⚠ ${e.message}`, true);
  }
  setChatLoading(false);
}

async function syncToMainHistory() {
  try {
    await fetch('/api/reader-history', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: readerChatMessages })
    });
  } catch(e) {}
}

function appendChatMsg(role, text, isErr, quotedText) {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = `cmsg ${role}` + (isErr ? ' error' : '');

  // Render quote block if provided
  if (quotedText) {
    const qBlock = document.createElement('div');
    qBlock.className = 'cmsg-quote';
    const qLabel = document.createElement('div');
    qLabel.className = 'cmsg-quote-label';
    qLabel.textContent = '引用';
    qBlock.appendChild(qLabel);
    const qText = document.createElement('span');
    qText.textContent = quotedText.length > 80 ? quotedText.slice(0, 80) + '…' : quotedText;
    qBlock.appendChild(qText);
    el.appendChild(qBlock);
  }

  const textNode = document.createElement('div');
  textNode.textContent = text;
  el.appendChild(textNode);

  const timeEl = document.createElement('div');
  timeEl.className = 'cmsg-time';
  timeEl.textContent = nowTime();
  el.appendChild(timeEl);

  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function setChatLoading(v) {
  chatLoading = v;
  document.getElementById('chat-send').disabled = v;
  document.getElementById('chat-typing').classList.toggle('show', v);
  if (v) document.getElementById('chat-typing').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ══════════════════════════════════════════
//  Upload
// ══════════════════════════════════════════
function onBookFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadBookFile(file, false);
  event.target.value = '';
}

function onShelfFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadBookFile(file, true);
  event.target.value = '';
}

async function uploadBookFile(file, fromShelf = false) {
  notify(`正在解析《${file.name}》…`);
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const b64 = e.target.result.split(',')[1];
      const r = await fetch('/api/upload-book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: file.name, data: b64 })
      });
      const data = await r.json();
      if (data.error) { notify('解析失败：' + data.error, true); return; }
      notify(`《${data.title}》已加载，共 ${data.total} 章`);
      if (fromShelf) {
        // Refresh shelf list in place
        await loadShelfList();
      }
      await tryLoadBook();
      if (!fromShelf) {
        sendChatMsgText(`我刚刚上传了《${data.title}》，我们来一起读吧。`);
      }
    } catch(e) { notify('上传失败：' + e.message, true); }
  };
  reader.readAsDataURL(file);
}

function setupDragDrop() {
  const area = document.getElementById('upload-drop-area');
  if (area) {
    area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor = 'var(--accent)'; });
    area.addEventListener('dragleave', () => { area.style.borderColor = ''; });
    area.addEventListener('drop', e => { e.preventDefault(); area.style.borderColor = ''; const f = e.dataTransfer.files[0]; if(f) uploadBookFile(f); });
  }
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f && ['txt','pdf','epub','md'].includes(f.name.split('.').pop().toLowerCase())) uploadBookFile(f);
  });
}

// ══════════════════════════════════════════
//  Bookshelf
// ══════════════════════════════════════════
async function openShelf() {
  document.getElementById('shelf-modal').classList.add('show');
  await loadShelfList();
}

function closeShelf() {
  document.getElementById('shelf-modal').classList.remove('show');
}

async function loadShelfList() {
  const list = document.getElementById('shelf-list');
  try {
    const r = await fetch('/api/bookshelf');
    const data = await r.json();
    const books = data.books || [];
    list.innerHTML = '';
    if (books.length === 0) {
      list.innerHTML = '<div class="shelf-empty">书柜为空，请上传电子书</div>';
      return;
    }
    books.forEach(b => {
      const isActive = bookMeta && bookMeta.title === b.title;
      const item = document.createElement('div');
      item.className = 'shelf-item' + (isActive ? ' active' : '');
      item.innerHTML = `
        <div class="shelf-item-icon">📖</div>
        <div class="shelf-item-info" style="cursor:pointer">
          <div class="shelf-item-title">${escHtml(b.title)}</div>
          <div class="shelf-item-meta">共 ${b.total} 章 · ${b.filename || ''}</div>
        </div>
        <div class="shelf-item-actions">
          <button class="tb-btn shelf-open-btn">打开</button>
          <button class="tb-btn shelf-rename-btn" title="重命名">✏</button>
          <button class="tb-btn shelf-delete-btn" title="删除" style="color:#e06c75">✕</button>
        </div>
      `;
      item.querySelector('.shelf-open-btn').onclick = (e) => { e.stopPropagation(); loadBookFromShelf(b.title); };
      item.querySelector('.shelf-item-info').onclick = () => loadBookFromShelf(b.title);
      item.querySelector('.shelf-rename-btn').onclick = (e) => { e.stopPropagation(); renameShelfBook(b.title); };
      item.querySelector('.shelf-delete-btn').onclick = (e) => { e.stopPropagation(); deleteShelfBook(b.title); };
      list.appendChild(item);
    });
  } catch(e) {
    list.innerHTML = '<div class="shelf-empty">加载失败</div>';
  }
}

async function deleteShelfBook(title) {
  if (!confirm(`确定要从书柜删除《${title}》吗？`)) return;
  try {
    await fetch(`/api/bookshelf/${encodeURIComponent(title)}`, { method: 'DELETE' });
    notify(`《${title}》已从书柜移除`);
    await loadShelfList();
  } catch(e) { notify('删除失败', true); }
}

async function renameShelfBook(title) {
  const newTitle = prompt(`为《${title}》输入新书名：`, title);
  if (!newTitle || newTitle === title) return;
  try {
    const r = await fetch(`/api/bookshelf/${encodeURIComponent(title)}/rename`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ new_title: newTitle })
    });
    const data = await r.json();
    if (data.error) { notify('重命名失败：' + data.error, true); return; }
    notify(`已重命名为《${newTitle}》`);
    await loadShelfList();
  } catch(e) { notify('重命名失败', true); }
}

async function loadBookFromShelf(title) {
  try {
    const r = await fetch('/api/bookshelf/load', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title})
    });
    const data = await r.json();
    if (data.error) { notify('加载失败：' + data.error, true); return; }
    notify(`《${title}》已打开`);
    closeShelf();
    await tryLoadBook();
  } catch(e) { notify('加载失败', true); }
}

async function closeBook() {
  if (!confirm('关闭当前书籍？')) return;
  try {
    await fetch('/api/book/close', { method: 'POST' });
  } catch(e) {}
  bookMeta = null;
  currentChapter = 0;
  chatHistory = [];
  readerChatMessages = [];
  // Reset UI
  document.getElementById('book-view').style.display = 'none';
  document.getElementById('no-book').style.display = 'flex';
  document.getElementById('btn-close-book').style.display = 'none';
  document.getElementById('btn-bookmark').style.display = 'none';
  document.getElementById('topbar-title').innerHTML = '<strong>正在加载…</strong>';
  document.title = '阅读 · 涟宗也';
  document.getElementById('toc-list').innerHTML = '';
  document.getElementById('chat-messages').innerHTML =
    '<div class="cmsg ai">把书加载进来，我们一起看。</div>';
  document.getElementById('progress-fill').style.width = '0%';
}

// ══════════════════════════════════════════
//  Panel toggles
// ══════════════════════════════════════════
function toggleTOC() {
  const sidebar = document.getElementById('toc-sidebar');
  const btn = document.getElementById('btn-toc');
  const hidden = sidebar.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
}

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  const btn = document.getElementById('btn-chat');
  const hidden = panel.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
}

// ══════════════════════════════════════════
//  Bookmarks
// ══════════════════════════════════════════
function loadBookmarks() {
  try {
    const saved = localStorage.getItem('reader_bookmarks');
    bookmarks = saved ? JSON.parse(saved) : [];
  } catch(e) { bookmarks = []; }
}

function saveBookmarks() {
  try {
    localStorage.setItem('reader_bookmarks', JSON.stringify(bookmarks));
  } catch(e) {}
}

function addBookmark() {
  if (!bookMeta) { notify('请先加载书籍', true); return; }
  const scroll = document.getElementById('reader-scroll');
  const scrollTop = scroll.scrollTop;
  const chapterTitle = document.getElementById('chapter-title').textContent || `第 ${currentChapter+1} 章`;
  // Avoid duplicate bookmarks at the same position
  const isDup = bookmarks.some(b =>
    b.bookTitle === bookMeta.title &&
    b.chapter === currentChapter &&
    Math.abs(b.scrollTop - scrollTop) < 20
  );
  if (isDup) { notify('该位置已有书签'); return; }
  const now = new Date();
  const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  bookmarks.push({
    bookTitle: bookMeta.title,
    chapter: currentChapter,
    chapterTitle,
    scrollTop,
    time: timeStr
  });
  saveBookmarks();
  notify('书签已添加 🔖');
  // Re-render list immediately if modal is already open
  if (document.getElementById('bookmark-modal').classList.contains('show')) {
    renderBookmarkList();
  }
}

function openBookmarks() {
  renderBookmarkList();
  document.getElementById('bookmark-modal').classList.add('show');
}

function closeBookmarks() {
  document.getElementById('bookmark-modal').classList.remove('show');
}

function renderBookmarkList() {
  const list = document.getElementById('bookmark-list');
  // Filter to current book if loaded
  const currentBookmarks = bookMeta
    ? bookmarks.filter(b => b.bookTitle === bookMeta.title)
    : bookmarks;
  if (currentBookmarks.length === 0) {
    list.innerHTML = '<div class="bk-empty">暂无书签<br><small>阅读时点击「🔖 书签」按钮可添加</small></div>';
    return;
  }
  list.innerHTML = '';
  currentBookmarks.forEach((bk, i) => {
    const globalIdx = bookmarks.indexOf(bk);
    const item = document.createElement('div');
    item.className = 'bk-item';
    item.innerHTML = `
      <div class="bk-icon">🔖</div>
      <div class="bk-info">
        <div class="bk-chap">${escHtml(bk.chapterTitle)}</div>
        <div class="bk-time">${escHtml(bk.bookTitle)} · ${bk.time}</div>
      </div>
      <button class="bk-del" title="删除书签" onclick="event.stopPropagation();removeBookmark(${globalIdx})">✕</button>
    `;
    item.addEventListener('click', () => jumpToBookmark(bk));
    list.appendChild(item);
  });
}

async function jumpToBookmark(bk) {
  closeBookmarks();
  if (!bookMeta || bk.bookTitle !== bookMeta.title) {
    notify('请先打开对应书籍', true);
    return;
  }
  if (bk.chapter !== currentChapter) {
    await goChapter(bk.chapter);
  }
  // Restore scroll position after a short delay to allow rendering
  setTimeout(() => {
    const scroll = document.getElementById('reader-scroll');
    scroll.scrollTop = bk.scrollTop;
  }, 120);
  notify(`已跳转至书签：${bk.chapterTitle}`);
}

function removeBookmark(globalIdx) {
  bookmarks.splice(globalIdx, 1);
  saveBookmarks();
  renderBookmarkList();
  notify('书签已删除');
}

// ══════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════
function nowTime() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let notifTimer;
function notify(msg, isErr) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.className = '', 2500);
}

// Restore theme preference
const savedTheme = localStorage.getItem('reader_theme') || 'dark';
setTheme(savedTheme);

init();
</script>
